---
- name: Windows Multi-Host Security Patching (API-Driven + Task Polling)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:\\Windows\\Temp"
    remote_patch_path: "{{ remote_temp_dir }}\\patch_install.msu"
    
    # --- NUTANIX CONFIG ---
    nutanix_host: "10.20.24.5" 
    nutanix_user: "michael" 
    nutanix_pass: "Oba@2024"
    snap_name: "PrePatch_{{ inventory_hostname | replace('.', '_') }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    # --- REPORTING ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "blaizymike@gmail.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:
    # ============================================================
    # PRE-CHECK & DATA GATHERING
    # ============================================================
    - name: Extract KB ID
      set_fact:
        kb_id: "{{ (src_patch | regex_search('kb[0-9]+', ignorecase=True) | default('KB5075906')) }}"

    - name: Check if KB is already installed
      win_shell: "Get-HotFix -Id {{ kb_id }} -ErrorAction SilentlyContinue"
      register: kb_check
      failed_when: false
      changed_when: false

    - name: Set patching requirement flag
      set_fact:
        needs_patching: "{{ kb_check.rc != 0 }}"

    - name: Get VM UUID from Nutanix
      nutanix.ncp.ntnx_vms_info:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        filter:
          vm_name: "{{ ntnx_name | default(inventory_hostname) }}"
      delegate_to: localhost
      register: vm_details
      when: needs_patching

    - name: Set VM UUID Fact
      set_fact:
        ntnx_uuid: "{{ (vm_details.response.entities[0].metadata.uuid) if vm_details.response is defined else (vm_details.entities[0].metadata.uuid) }}"
      when: 
        - needs_patching 
        - (vm_details.response is defined and vm_details.response.entities | length > 0) or (vm_details.entities is defined and vm_details.entities | length > 0)

    # ============================================================
    # PHASE 1: SNAPSHOT & TASK POLLING
    # ============================================================
    - name: PHASE 1.1 Create Pre-Patch Snapshot via Nutanix REST API
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v3/vm_snapshots"
        method: POST
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
        status_code: [201, 202]
        body_format: json
        body:
          metadata:
            kind: "vm_snapshot"
          spec:
            name: "{{ snap_name }}"
            resources: {} 
            entity_reference:
              kind: "vm"
              uuid: "{{ ntnx_uuid }}"
      delegate_to: localhost
      register: api_snap_info
      when: needs_patching and ntnx_uuid is defined

    

    - name: PHASE 1.2 Wait for Snapshot Task to Complete
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v3/tasks/{{ api_snap_info.json.status.execution_context.task_uuid }}"
        method: GET
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
      delegate_to: localhost
      register: task_status
      until: "task_status.json.status == 'SUCCEEDED'"
      retries: 10
      delay: 10
      when: needs_patching and api_snap_info.json.status.execution_context.task_uuid is defined

    - name: Capture Pre-Patch Listening Ports
      win_shell: |
        Get-NetTCPConnection -State Listen | Select-Object -ExpandProperty LocalPort | Sort-Object -Unique
      register: pre_patch_ports
      changed_when: false
      when: needs_patching

    - name: Copy patch to Windows server
      win_copy:
        src: "{{ src_patch }}"
        dest: "{{ remote_patch_path }}"
      when: needs_patching

    # ============================================================
    # INITIALIZE REPORTING
    # ============================================================
    - name: Initialize reporting variables
      set_fact:
        patch_status: "{{ 'Already Patched' if not needs_patching else 'Pending' }}"
        reboot_status: "No reboot required"
        recovery_action: "None"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"

    # ============================================================
    # PHASE 2 & 3: INSTALL & VALIDATE
    # ============================================================
    - name: Main Installation Block
      block:
        - name: Install .msu patch
          win_command: "wusa.exe '{{ remote_patch_path }}' /quiet /norestart"
          async: 3600
          poll: 30
          register: install_result
          when: needs_patching
          failed_when: >
            install_result.rc is defined and
            install_result.rc not in [0, 3010, 17021, 2359302]

        - name: Reboot if required
          win_reboot:
            reboot_timeout: 1200
          register: reboot_result
          when: needs_patching and (install_result.rc | default(0)) == 3010

        - name: Update reboot status
          set_fact:
            reboot_status: "Reboot Completed"
          when: reboot_result is defined and (reboot_result.rebooted | default(false))

        - name: Post-Patch Health Validation
          win_shell: |
            $prePorts = "{{ pre_patch_ports.stdout_lines | join(',') }}".Split(',')
            $postPorts = Get-NetTCPConnection -State Listen | Select-Object -ExpandProperty LocalPort | Sort-Object -Unique
            foreach ($port in $prePorts) { if ($port -and ($port -notin $postPorts)) { exit 1 } }
            exit 0
          register: validation_result
          retries: 5
          delay: 45
          until: validation_result.rc == 0
          when: needs_patching
          failed_when: validation_result.rc != 0

        - name: Set success status
          set_fact:
            patch_status: "Success"
          when: needs_patching

      # ============================================================
      # PHASE 4: ROLLBACK (RESCUE)
      # ============================================================
      rescue:
        - name: Power Off VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_off"
            vm_name: "{{ ntnx_name | default(inventory_hostname) }}"
          delegate_to: localhost
          ignore_errors: yes

        - name: Restore via REST API
          uri:
            url: "https://{{ nutanix_host }}:9440/api/nutanix/v3/vm_snapshots/{{ api_snap_info.json.metadata.uuid }}/revert"
            method: POST
            user: "{{ nutanix_user }}"
            password: "{{ nutanix_pass }}"
            force_basic_auth: yes
            validate_certs: false
            body_format: json
            body: {} 
          delegate_to: localhost
          when: api_snap_info.json is defined

        - name: Power On VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_on"
            vm_name: "{{ ntnx_name | default(inventory_hostname) }}"
          delegate_to: localhost

        - name: Wait for WinRM Connection
          wait_for_connection:
            delay: 30
            timeout: 600

        - name: Set failure facts
          set_fact:
            patch_status: "FAILED - ROLLED BACK"
            recovery_action: "Rollback completed via Nutanix API"

    # ============================================================
    # CLEANUP & REPORTING
    # ============================================================
    - name: Cleanup patch file
      win_file:
        path: "{{ remote_patch_path }}"
        state: absent
      ignore_errors: yes

    - name: Create CSV Header
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ report_file }}"
        content: "\"Hostname\",\"IP_Address\",\"Patch_Status\",\"Reboot_Action\",\"Recovery_Action\",\"Timestamp\"\n"

    - name: Append host data to CSV
      delegate_to: localhost
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "\"{{ inventory_hostname }}\",\"{{ reporting_ip }}\",\"{{ patch_status }}\",\"{{ reboot_status }}\",\"{{ recovery_action }}\",\"{{ lookup('pipe','date --iso-8601=seconds') }}\""

    - name: Email Final Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password | default('your_app_password') }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS PATCHING: Cycle Complete"
        body: "Windows patching workflow has finished. Attached is the final audit report."
        attach: "{{ report_file }}"
