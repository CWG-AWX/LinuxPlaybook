---
- name: Build Robust Windows 2022 VM
  hosts: localhost
  gather_facts: false
  vars:
    # --- AUTHENTICATION ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRASTRUCTURE ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f" 
    container_name: "cwg-default-container"
    
    # --- IMAGES ---
    win_2022_iso: "b3772959-af75-4d6c-9125-f5c941c0dd78"
    virtio_iso: "4e5b6677-e2e2-4786-85f2-fe5e78d999bf"
    
    # --- VM SPECS ---
    vm_name: "WIN-2022-SRE-PROD2"
    vcpus_count: 2
    memory_gb_size: 8
    disk_size_gb: 500
    
    sysprep_file_path: "/tmp/unattend.xml"

  tasks:
    - name: Task 1 - Generate sysprep XML file
      copy:
        dest: "{{ sysprep_file_path }}"
        content: |
          <?xml version="1.0" encoding="utf-8"?>
          <unattend xmlns="urn:schemas-microsoft-com:unattend">
            <settings pass="specialize">
              <component name="Microsoft-Windows-Shell-Setup" language="neutral" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" versionScope="nonSxS">
                <TimeZone>W. Central Africa Standard Time</TimeZone>
              </component>
            </settings>
            <settings pass="oobeSystem">
              <component name="Microsoft-Windows-Shell-Setup" language="neutral" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" versionScope="nonSxS">
                <UserAccounts>
                  <AdministratorPassword><Value>security@123</Value><PlainText>true</PlainText></AdministratorPassword>
                </UserAccounts>
                <AutoLogon>
                  <Password><Value>security@123</Value></Password>
                  <Enabled>true</Enabled>
                  <Username>Administrator</Username>
                </AutoLogon>
                <FirstLogonCommands>
                  <SynchronousCommand action="add">
                    <Order>1</Order>
                    <CommandLine>cmd.exe /c powershell.exe -ExecutionPolicy Bypass -Command "$u='ansible_svc';$p=ConvertTo-SecureString 'cwg@2026' -AsPlainText -Force; if(!(Get-LocalUser -Name $u -ErrorAction SilentlyContinue)){New-LocalUser -Name $u -Password $p; Add-LocalGroupMember -Group 'Administrators' -Member $u;} Set-LocalUser -Name $u -PasswordNeverExpires $true; winrm quickconfig -q; Set-Service WinRM -StartupType Automatic; Enable-PSRemoting -Force; winrm set winrm/config/service '@{AllowUnencrypted=\"true\"}'; winrm set winrm/config/service/auth '@{Basic=\"true\"}'; $ni=(Get-NetAdapter | where status -eq 'up').ifIndex; New-NetIPAddress -InterfaceIndex $ni -IPAddress '192.168.41.101' -PrefixLength 24 -DefaultGateway '192.168.41.1'; Set-DnsClientServerAddress -InterfaceIndex $ni -ServerAddresses ('8.8.8.8','1.1.1.1'); Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False;"</CommandLine>
                  </SynchronousCommand>
                </FirstLogonCommands>
              </component>
            </settings>
          </unattend>

    - name: Task 2 - Create and Start VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        vcpus: "{{ vcpus_count }}"
        cores_per_vcpu: 1
        memory_gb: "{{ memory_gb_size }}"
        boot_config:
          boot_type: "LEGACY"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: "DISK"
            bus: "SCSI"
            size_gb: "{{ disk_size_gb }}"
            storage_container:
              name: "{{ container_name }}"
          - type: "CDROM"
            bus: "SATA"
            clone_image:
              uuid: "{{ win_2022_iso }}"
          - type: "CDROM"
            bus: "SATA"
            clone_image:
              uuid: "{{ virtio_iso }}"
        guest_customization:
          type: "sysprep"
          script_path: "{{ sysprep_file_path }}"

    - name: Task 3 - Cleanup local file
      file:
        path: "{{ sysprep_file_path }}"
        state: absent

    - name: Task 4 - Deployment Summary
      debug:
        msg: "VM {{ vm_name }} has been successfully created and started. Proceed with OS installation via the Nutanix console."
