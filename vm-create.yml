---
- name: Build Robust Windows 2022 VM
  hosts: localhost
  gather_facts: false
  vars:
    # --- AUTHENTICATION ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRASTRUCTURE ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f" # NKP-VLAN
    container_name: "cwg-default-container"
    
    # --- IMAGES ---
    win_2022_iso: "b3772959-af75-4d6c-9125-f5c941c0dd78"
    virtio_iso: "4e5b6677-e2e2-4786-85f2-fe5e78d999bf"
    
    # --- VM SPECS ---
    vm_name: "WIN-2022-SRE-PROD"
    vcpus: 2
    memory_gb: 8
    disk_size_gb: 500

  tasks:
    - name: Deploy VM with Sysprep and Static Networking
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        num_vcpus: "{{ vcpus }}"
        num_cores_per_vcpu: 1
        memory_gb: "{{ memory_gb }}"
        boot_config:
          boot_type: "UEFI"
        
        networks:
          - subnet:
              uuid: "{{ subnet_uuid }}"
        
        disks:
          - type: "DISK"
            bus: "VIRTIO"
            size_gb: "{{ disk_size_gb }}"
            storage_container:
              name: "{{ container_name }}"
          - type: "CDROM"
            bus: "SATA"
            clone_image:
              uuid: "{{ win_2022_iso }}"
          - type: "CDROM"
            bus: "SATA"
            clone_image:
              uuid: "{{ virtio_iso }}"

        # Refined Guest Customization Block
        guest_customization:
          cloud_init: # Some NCP versions use cloud_init as the parent key even for Sysprep
            sysprep:
              install_type: "fresh"
              unattend_xml: |
                <?xml version="1.0" encoding="utf-8"?>
                <unattend xmlns="urn:schemas-microsoft-com:unattend">
                  <settings pass="specialize">
                    <component name="Microsoft-Windows-Shell-Setup" language="neutral" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" versionScope="nonSxS">
                      <TimeZone>W. Central Africa Standard Time</TimeZone>
                    </component>
                  </settings>
                  <settings pass="oobeSystem">
                    <component name="Microsoft-Windows-Shell-Setup" language="neutral" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" versionScope="nonSxS">
                      <UserAccounts>
                        <AdministratorPassword>
                          <Value>security@123</Value>
                          <PlainText>true</PlainText>
                        </AdministratorPassword>
                      </UserAccounts>
                      <AutoLogon>
                        <Password><Value>security@123</Value></Password>
                        <Enabled>true</Enabled>
                        <Username>Administrator</Username>
                      </AutoLogon>
                      <FirstLogonCommands>
                        <SynchronousCommand action="add">
                          <Order>1</Order>
                          <Description>Run Prep Script</Description>
                          <CommandLine>powershell.exe -ExecutionPolicy Bypass -Command "
                            $u='ansible_svc';$p=ConvertTo-SecureString 'cwg@2026' -AsPlainText -Force;
                            if(!(Get-LocalUser -Name $u -ErrorAction SilentlyContinue)){
                              New-LocalUser -Name $u -Password $p;
                              Add-LocalGroupMember -Group 'Administrators' -Member $u;
                            }
                            Set-LocalUser -Name $u -PasswordNeverExpires $true;
                            winrm quickconfig -q;
                            Set-Service WinRM -StartupType Automatic;
                            Enable-PSRemoting -Force;
                            winrm set winrm/config/service '@{AllowUnencrypted=\"true\"}';
                            winrm set winrm/config/service/auth '@{Basic=\"true\"}';
                            $ni=(Get-NetAdapter | where status -eq 'up').ifIndex;
                            New-NetIPAddress -InterfaceIndex $ni -IPAddress '192.168.41.101' -PrefixLength 24 -DefaultGateway '192.168.41.1';
                            Set-DnsClientServerAddress -InterfaceIndex $ni -ServerAddresses ('8.8.8.8','1.1.1.1');
                            Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False;
                          "</CommandLine>
                        </SynchronousCommand>
                      </FirstLogonCommands>
                    </component>
                  </settings>
                </unattend>
      register: deploy_status

    - name: Power On the VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        power_state: "on"
      when: deploy_status.changed
