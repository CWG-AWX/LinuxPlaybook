---
- name: Report Primary IP Addresses (Windows - Fast & Clean)
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Display Primary IPv4 Address
      debug:
        msg: >
          Host: {{ inventory_hostname }} |
          Primary IP: {{ ansible_host | default('No IP Found') }}

    - name: Summary Table
      run_once: true
      debug:
        msg: |
          ================== SERVER IP SUMMARY ==================
          {% for host in ansible_play_hosts %}
          {{ "%-25s" | format(host) }} : {{ hostvars[host]['ansible_host'] | default('N/A') }}
          {% endfor %}
