---
- name: Report Windows Primary IP Addresses
  hosts: all
  gather_facts: true
  tasks:
    - name: Display Primary IPv4 Address
      ansible.builtin.debug:
        msg: "Host: {{ inventory_hostname }} | Primary IP: {{ ansible_ip_addresses[0] | default('No IP Found') }}"

    - name: Summary Table
      run_once: true
      ansible.builtin.debug:
        msg: |
          {% for host in ansible_play_hosts %}
          {{ host | pad_to_length(20) }}: {{ hostvars[host]['ansible_ip_addresses'][0] | default('N/A') }}
          {% endfor %}
      vars:
        # This helps align the text in the AWX/Console output
        pad_to_length: "{{ (host | string).ljust(20) }}"
      ignore_errors: yes
