---
- name: Deploy Ubuntu VM (Static IP - Nutanix + AWX Ready)
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    # --- NUTANIX AUTH ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRA ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "cc5b686a-096c-434d-b55b-fec9494f8675"
    image_uuid: "106386af-ceb2-44d7-bdba-fb0333addd59"

    # --- AWX SURVEY INPUTS ---
    # vm_name: ""
    # target_ip: ""
    # target_gateway: ""
    # vm_cpu: ""
    # vm_memory_gb: ""
    # extra_disk_gb: ""
    netmask: "24"

    sysprep_path: "/tmp/cloud-init-{{ vm_name }}.yaml"

  tasks:

    - name: Create cloud-init config
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config
          preserve_hostname: false
          hostname: "{{ vm_name }}"
          fqdn: "{{ vm_name }}"

          users:
            - name: fiftbuser
              groups: sudo
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              fiftbuser:cwg@2026
            expire: false

          ssh_pwauth: true

          runcmd:
            - |
              bash -c '
              hostnamectl set-hostname "{{ vm_name }}"

             
              IFACE=$(nmcli -t -f DEVICE dev status | grep -v lo | head -n 1)
              for conn in $(nmcli -t -f NAME connection show); do nmcli connection delete "$conn"; done
              nmcli con add type ethernet con-name static-ip ifname "$IFACE" \
                ipv4.addresses {{ target_ip }}/{{ netmask }} \
                ipv4.gateway {{ target_gateway }} \
                ipv4.dns "8.8.8.8,1.1.1.1" \
                ipv4.method manual

              nmcli con up static-ip

              # =========================
              # EXT4 LVM AUTO EXPANSION
              # =========================
              rm -f /etc/lvm/devices/system.devices
              vgscan
              pvscan

              EXTRA_DISK=$(lsblk -dn -o NAME,TYPE | grep disk | awk '\''{print $1}'\'' | grep -vE "sda|vda" | head -n 1)

              if [ -n "$EXTRA_DISK" ]; then
                pvcreate /dev/$EXTRA_DISK

                VG_NAME=$(vgs --noheadings -o vg_name | xargs | awk '\''{print $1}'\'')
                LV_PATH=$(lvdisplay -C -o lv_path --noheadings | head -n 1)

                if [ -n "$VG_NAME" ] && [ -n "$LV_PATH" ]; then
                  vgextend $VG_NAME /dev/$EXTRA_DISK
                  lvextend -l +100%FREE $LV_PATH
                  resize2fs $LV_PATH
                fi
              fi
              '

            - systemctl enable ssh --now

    - name: Deploy VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"

        vcpus: "{{ vm_cpu | int }}"
        memory_gb: "{{ vm_memory_gb | int }}"

        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"

        disks:
          - type: DISK
            bus: SCSI
            clone_image:
              uuid: "{{ image_uuid }}"

          - type: DISK
            bus: SCSI
            size_gb: "{{ extra_disk_gb | int }}"

        guest_customization:
          type: cloud_init
          script: "{{ lookup('file', sysprep_path) }}"

    - name: Add VM to inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ target_ip }}"
        ansible_user: fiftbuser
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

   # - name: Wait for VM to be ready
