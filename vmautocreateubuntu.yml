---
- name: Deploy Ubuntu VM (Static IP - Nutanix + AWX Ready)
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    # --- NUTANIX AUTH ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRA ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f"
    image_uuid: "5ea85426-1c3e-42a5-9b45-fb1fd91fdcbc"

    # --- AWX SURVEY INPUTS ---
    # vm_name: ""
    # target_ip: ""
    # target_gateway: ""
    netmask: "24"

    sysprep_path: "/tmp/cloud-init-{{ vm_name }}.yaml"

  tasks:

    - name: Create cloud-init config
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config
          preserve_hostname: false
          hostname: "{{ vm_name }}"
          fqdn: "{{ vm_name }}"

          users:
            - name: ubuntu
              groups: sudo           # Ubuntu uses 'sudo' group, not 'wheel'
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              ubuntu:cwg@2026
            expire: false

          ssh_pwauth: true

          # Disable cloud-init network management so our Netplan config takes over
          network:
            config: disabled

          runcmd:
            - |
              bash -c '
              # FORCE HOSTNAME
              echo "{{ vm_name }}" > /etc/hostname
              hostnamectl set-hostname "{{ vm_name }}"
              systemctl restart systemd-hostnamed

              # GET PRIMARY INTERFACE (first non-loopback)
              IFACE=$(ip -o link show | awk -F": " '\''{print $2}'\'' | grep -v "lo" | head -n 1)

              # FLUSH ALL IP ADDRESSES AND ROUTES ON THE INTERFACE
              ip addr flush dev "$IFACE"
              ip route flush dev "$IFACE"

              # NUKE ALL EXISTING NETPLAN CONFIGS (equivalent to nmcli connection delete in RHEL)
              rm -f /etc/netplan/*.yaml
              rm -f /etc/netplan/*.yml

              # WRITE FRESH STATIC NETPLAN CONFIG
              cat > /etc/netplan/99-static.yaml <<EOF
              network:
                version: 2
                ethernets:
                  ${IFACE}:
                    addresses:
                      - {{ target_ip }}/{{ netmask }}
                    routes:
                      - to: default
                        via: {{ target_gateway }}
                    nameservers:
                      addresses: [8.8.8.8, 1.1.1.1]
              EOF

              chmod 600 /etc/netplan/99-static.yaml

              # APPLY NEW CONFIG
              netplan generate
              netplan apply
              '

            # Ubuntu SSH service is named "ssh", not "sshd"
            - systemctl enable ssh --now

    - name: Deploy VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: DISK
            bus: SCSI
            clone_image:
              uuid: "{{ image_uuid }}"
        guest_customization:
          type: cloud_init
          script: "{{ lookup('file', sysprep_path) }}"

    - name: Add VM to inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu              # Ubuntu default cloud user
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Wait for VM to be ready
      wait_for_connection:
        delay: 45
        timeout: 120
      delegate_to: "{{ vm_name }}"

    - name: Remove temp cloud-init file
      file:
        path: "{{ sysprep_path }}"
        state: absent

# =========================================
# POST CONFIG
# =========================================
- name: Bootstrap Ubuntu Node for AWX
  hosts: "{{ vm_name }}"
  become: yes

  vars:
    ansible_user_name: "ansible"
    awx_pub_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBEuxy3oDAAUDqVY4pDOISchf5DDrU491kluibL64HqK awx-ansible"

  tasks:

    - name: Create ansible user
      user:
        name: "{{ ansible_user_name }}"
        shell: /bin/bash
        create_home: yes

    - name: Add SSH key
      authorized_key:
        user: "{{ ansible_user_name }}"
        key: "{{ awx_pub_key }}"

    - name: Enable sudo
      copy:
        dest: "/etc/sudoers.d/{{ ansible_user_name }}"
        content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Enable SSH pubkey auth
      # Ubuntu 22.04+ uses drop-in config files under sshd_config.d/
      copy:
        dest: /etc/ssh/sshd_config.d/90-pubkey.conf
        content: "PubkeyAuthentication yes\n"
        mode: '0644'
      notify: restart ssh

  handlers:
    - name: restart ssh
      service:
        name: ssh          # Ubuntu service name is 'ssh', not 'sshd'
        state: restarted
