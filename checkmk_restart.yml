---
- name: Restart Checkmk Agent Service
  hosts: all
  tasks:
    - name: Restart the Checkmk service
      ansible.windows.win_service:
        name: CheckMkService
        state: restarted
      register: restart_result

    - name: Confirm new status
      ansible.builtin.debug:
        msg: "CheckMkService on {{ inventory_hostname }} is now {{ restart_result.state }}"
