---
- name: Verify Outbound Connectivity to Checkmk Server (Port 8000)
  hosts: all
  gather_facts: no
  vars:
    # Set your Checkmk Server IP here (or pass it via AWX Extra Variables)
    checkmk_server_ip: "192.168.184.60"
    checkmk_port: 8000

  tasks:
    - name: Test connectivity from Windows host to Checkmk server port
      ansible.windows.win_shell: >
        $result = Test-NetConnection -ComputerName "{{ checkmk_server_ip }}" -Port {{ checkmk_port }} -WarningAction SilentlyContinue;
        if ($result.TcpTestSucceeded) { exit 0 } else { exit 1 }
      register: connectivity_check
      failed_when: connectivity_check.rc != 0
      changed_when: false
