---
- name: Change root password on all Linux servers
  hosts: all
  gather_facts: true
  become: true

  vars:
    target_user: "root"
    new_password: "security@123"

  tasks:

    - name: Verify root user exists on this host
      ansible.builtin.getent:
        database: passwd
        key: "{{ target_user }}"
      register: user_check
      ignore_errors: true

    - name: Fail if root does not exist on this host
      ansible.builtin.fail:
        msg: "User '{{ target_user }}' does not exist on {{ inventory_hostname }} — skipping"
      when: user_check.failed

    - name: Hash the new password (sha512, OS-agnostic)
      ansible.builtin.set_fact:
        hashed_password: "{{ new_password | password_hash('sha512') }}"

    - name: Apply new password to root
      ansible.builtin.user:
        name: "{{ target_user }}"
        password: "{{ hashed_password }}"
        update_password: always

    - name: Confirm update on this host
      ansible.builtin.debug:
        msg: "Password updated for '{{ target_user }}' on {{ inventory_hostname }} ({{ ansible_os_family }})"
