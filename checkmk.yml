---
- name: Deploy Checkmk Agent and Local Password Check
  hosts: all
  become: yes
  gather_facts: yes  # Required to get the IP addresses
  
  vars:
    agent_deb: "check-mk-agent_2.4.0p20-1_all.deb"
    agent_rpm: "check-mk-agent-2.4.0p20-1.noarch.rpm"
    script_dest: "/usr/lib/check_mk_agent/local/check_password_expiry.sh"

  tasks:
    # --- 1. PRE-CHECK ---
    - name: Gather Service Facts
      ansible.builtin.service_facts:

    - name: Check if Checkmk is already active
      ansible.builtin.set_fact:
        checkmk_active: "{{ ansible_facts.services['check-mk-agent.socket']['state'] == 'running' if 'check-mk-agent.socket' in ansible_facts.services else false }}"

    # --- 2. INSTALLATION BLOCK (SKIPPED IF RUNNING) ---
    - name: Install Checkmk Agent
      block:
        - name: Set Package Name for OS
          ansible.builtin.set_fact:
            agent_pkg: "{{ agent_rpm if ansible_os_family == 'RedHat' else agent_deb }}"

        - name: Copy Agent Package
          ansible.builtin.copy:
            src: "{{ agent_pkg }}"
            dest: "/tmp/{{ agent_pkg }}"
            mode: '0644'

        - name: Install RPM (RHEL)
          ansible.builtin.dnf:
            name: "/tmp/{{ agent_pkg }}"
            state: present
            disable_gpg_check: yes
          when: ansible_os_family == "RedHat"

        - name: Install DEB (Ubuntu)
          ansible.builtin.apt:
            deb: "/tmp/{{ agent_pkg }}"
            state: present
          when: ansible_os_family == "Debian"

        - name: Cleanup Temporary Package
          ansible.builtin.file:
            path: "/tmp/{{ agent_pkg }}"
            state: absent
      when: not checkmk_active

    # --- 3. SERVICE & FIREWALL ---
    - name: Ensure Checkmk Socket is enabled and started
      ansible.builtin.systemd:
        name: check-mk-agent.socket
        enabled: yes
        state: started

    - name: Open Firewall Port 6556
      ansible.builtin.include_tasks: 
        # Logic to handle firewalld (RHEL) or ufw (Ubuntu)
      ignore_errors: yes

    # --- 4. SCRIPT DEPLOYMENT ---
    - name: Deploy Password Expiry Script
      ansible.builtin.copy:
        dest: "{{ script_dest }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # (Script content here...)
          echo "Checkmk local script deployed."

    # --- 5. SUCCESS REPORTING JOB ---
    - name: Print Deployment Confirmation
      ansible.builtin.debug:
        msg: 
          - "------------------------------------------------"
          - "DEPLOYMENT SUCCESSFUL"
          - "Hostname: {{ inventory_hostname }}"
          - "IP Address: {{ ansible_default_ipv4.address }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
          - "------------------------------------------------"
