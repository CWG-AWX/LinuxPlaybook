---
- name: Deploy Checkmk Password Expiry Script to Windows
  hosts: windows_servers
  tasks:
    - name: Ensure Checkmk local directory exists
      ansible.windows.win_file:
        path: C:\ProgramData\checkmk\agent\local
        state: directory

    - name: Deploy Password Expiry PowerShell Script
      ansible.windows.win_copy:
        dest: C:\ProgramData\checkmk\agent\local\check_password_expiry.ps1
        content: |
          $WarningDays = 7
          $CriticalDays = 0
          $users = Get-LocalUser | Where-Object { $_.Enabled -eq $true -and $_.PasswordExpires -ne $null }
          foreach ($user in $users) {
              $daysLeft = ($user.PasswordExpires - (Get-Date)).Days
              if ($daysLeft -le $CriticalDays) { $state = 2; $statusText = "CRITICAL" }
              elseif ($daysLeft -le $WarningDays) { $state = 1; $statusText = "WARNING" }
              else { $state = 0; $statusText = "OK" }
              "{0} PasswordExpiry_{1} days_left={2} {3}: Password for {1} expires in {2} days" -f $state, $user.Name, $daysLeft, $statusText
          }
