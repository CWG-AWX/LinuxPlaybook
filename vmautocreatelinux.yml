---
- name: Deploy RHEL 9 VM and Prepare for AWX Bootstrap
  hosts: localhost
  gather_facts: false

  vars:
    # --- AUTHENTICATION ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRASTRUCTURE ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f"
    image_uuid: "5ea85426-1c3e-42a5-9b45-fb1fd91fdcbc"

    # --- VARIABLES ---
    sysprep_path: "/tmp/cloud-init.yaml"

  tasks:

    - name: Generate working cloud-init config
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config

          users:
            - name: Administrator
              groups: wheel
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              Administrator:cwg@2026
            expire: false

          runcmd:
            - IFACE=$(nmcli -t -f DEVICE,STATE dev | grep ":connected" | cut -d: -f1 | head -n1)
            - nmcli con mod "$IFACE" ipv4.addresses {{ target_ip }}/24
            - nmcli con mod "$IFACE" ipv4.gateway {{ target_gateway }}
            - nmcli con mod "$IFACE" ipv4.dns "8.8.8.8 1.1.1.1"
            - nmcli con mod "$IFACE" ipv4.method manual
            - nmcli con down "$IFACE"
            - nmcli con up "$IFACE"
            - timedatectl set-timezone America/New_York
            - systemctl enable sshd --now
            - systemctl enable firewalld --now
            - firewall-cmd --permanent --add-service=ssh
            - firewall-cmd --reload
            - chage -M 99999 Administrator


    - name: Deploy RHEL 9 VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        vcpus: 2
        memory_gb: 8
        boot_config:
          boot_type: "LEGACY"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: "DISK"
            bus: "SCSI"
            clone_image:
              uuid: "{{ image_uuid }}"
        guest_customization:
          type: "cloud_init"
          script_path: "{{ sysprep_path }}"


    - name: Wait for SSH to be available
      wait_for:
        host: "{{ target_ip }}"
        port: 22
        state: started
        delay: 90
        timeout: 900


    - name: Add new VM as localhost target
      add_host:
        name: localhost
        ansible_host: "{{ target_ip }}"
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'


    - name: Cleanup cloud-init file
      file:
        path: "{{ sysprep_path }}"
        state: absent



