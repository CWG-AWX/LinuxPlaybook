---
- name: Deploy RHEL 9 VM and Bootstrap for AWX
  hosts: localhost
  gather_facts: false

  vars:
    # --- AUTHENTICATION ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRASTRUCTURE ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f"
    image_uuid: "726d4f5c-d810-473f-a61f-cc4acdad5e39"

    # --- AWX SURVEY VARIABLES ---
    sysprep_path: "/tmp/cloud-init.yaml"
    ansible_user_name: "ansible"
    awx_pub_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBEuxy3oDAAUDqVY4pDOISchf5DDrU491kluibL64HqK awx-ansible"

  tasks:

    # ===============================
    # VM DEPLOYMENT
    # ===============================

    - name: Task 1 - Generate cloud-init config for RHEL 9
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config

          users:
            - name: Administrator
              groups: wheel
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              Administrator:cwg@2026
            expire: false

          write_files:
            - path: /usr/local/bin/custom-init.sh
              permissions: '0755'
              content: |
                #!/bin/bash

                # Set timezone
                timedatectl set-timezone America/New_York

                # Enable and start firewalld
                systemctl enable firewalld --now

                # Enable and start sshd
                systemctl enable sshd --now

                # Ensure password never expires
                chage -M 99999 Administrator

                # Configure static IP
                nmcli con mod "$(nmcli -t -f NAME con show --active | head -n1)" \
                  ipv4.addresses {{ target_ip }}/24 \
                  ipv4.gateway {{ target_gateway }} \
                  ipv4.dns "8.8.8.8 1.1.1.1" \
                  ipv4.method manual

                nmcli con up "$(nmcli -t -f NAME con show --active | head -n1)"

            - path: /etc/systemd/system/custom-init.service
              permissions: '0644'
              content: |
                [Unit]
                Description=Custom Init Script
                After=network.target

                [Service]
                Type=oneshot
                ExecStart=/usr/local/bin/custom-init.sh
                RemainAfterExit=true

                [Install]
                WantedBy=multi-user.target

          runcmd:
            - systemctl daemon-reexec
            - systemctl daemon-reload
            - systemctl enable custom-init.service
            - systemctl start custom-init.service


    - name: Task 2 - Deploy RHEL 9 VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        vcpus: 2
        memory_gb: 8
        boot_config:
          boot_type: "LEGACY"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: "DISK"
            bus: "SCSI"
            clone_image:
              uuid: "{{ image_uuid }}"
        guest_customization:
          type: "cloud_init"
          script_path: "{{ sysprep_path }}"


    - name: Task 3 - Wait for SSH to be available
      wait_for:
        host: "{{ target_ip }}"
        port: 22
        state: started
        delay: 60
        timeout: 600


    - name: Task 4 - Cleanup cloud-init file
      file:
        path: "{{ sysprep_path }}"
        state: absent


    # ===============================
    # BOOTSTRAP FOR AWX (REMOTE EXECUTION)
    # ===============================

    - name: Create the ansible service account
      user:
        name: "{{ ansible_user_name }}"
        shell: /bin/bash
        state: present
        create_home: yes
      delegate_to: "{{ target_ip }}"
      become: yes
      vars:
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Set up authorized_keys for the ansible user
      authorized_key:
        user: "{{ ansible_user_name }}"
        state: present
        key: "{{ awx_pub_key }}"
      delegate_to: "{{ target_ip }}"
      become: yes
      vars:
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Configure passwordless sudo for the ansible user
      copy:
        content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL"
        dest: "/etc/sudoers.d/{{ ansible_user_name }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'
      delegate_to: "{{ target_ip }}"
      become: yes
      vars:
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Ensure PubkeyAuthentication is enabled in sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
      notify: Restart SSH
      delegate_to: "{{ target_ip }}"
      become: yes
      vars:
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  handlers:
    - name: Restart SSH
      service:
        name: sshd
        state: restarted
      delegate_to: "{{ target_ip }}"
      become: yes
      vars:
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
