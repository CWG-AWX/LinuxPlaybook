---
- name: Deploy RHEL 9 VM (Static IP - Nutanix + AWX Ready)
  hosts: localhost
  gather_facts: false

  vars:
    # --- NUTANIX AUTH ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRA ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f"
    image_uuid: "5ea85426-1c3e-42a5-9b45-fb1fd91fdcbc"

    # --- PROVIDED VIA AWX SURVEY ---
    # vm_name
    # target_ip
    # target_gateway
    netmask: "24"

    sysprep_path: "/tmp/cloud-init.yaml"

  tasks:

    - name: Create cloud-init config (STATIC + TIMEZONE + USERS + CRON)
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config

          users:
            - name: Administrator
              groups: wheel
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

            - name: osadmin
              groups: wheel
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              Administrator:cwg@2026
              osadmin:cwg@2026
            expire: false

          ssh_pwauth: true
          package_update: true

          network:
            version: 2
            ethernets:
              ens3:
                dhcp4: no
                addresses:
                  - {{ target_ip }}/{{ netmask }}
                gateway4: {{ target_gateway }}
                nameservers:
                  addresses:
                    - 8.8.8.8
                    - 1.1.1.1

          timezone: America/New_York

          runcmd:
            - ip a > /root/network-debug.txt
            - systemctl enable sshd --now
            - systemctl enable firewalld --now
            - firewall-cmd --permanent --add-service=ssh
            - firewall-cmd --reload

            # Cron for Administrator
            - echo "*/2 * * * * logger 'AWX test in progress'" > /var/spool/cron/Administrator
            - chown Administrator:Administrator /var/spool/cron/Administrator
            - chmod 600 /var/spool/cron/Administrator

            # Cron for osadmin
            - echo "*/2 * * * * logger 'AWX test successful'" > /var/spool/cron/osadmin
            - chown osadmin:osadmin /var/spool/cron/osadmin
            - chmod 600 /var/spool/cron/osadmin

            - systemctl restart crond

    - name: Deploy VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        vcpus: 2
        memory_gb: 8
        boot_config:
          boot_type: "LEGACY"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: DISK
            bus: SCSI
            clone_image:
              uuid: "{{ image_uuid }}"
        guest_customization:
          type: cloud_init
          script_path: "{{ sysprep_path }}"

    - name: Add VM to inventory
      add_host:
        name: new_vm
        ansible_host: "{{ target_ip }}"
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Set static IP from survey
      shell: |
        IFACE=$(nmcli -t -f DEVICE,STATE dev | grep ":connected" | cut -d: -f1 | head -n1)

        nmcli con mod "$IFACE" ipv4.addresses {{ target_ip }}/{{ netmask }}
        nmcli con mod "$IFACE" ipv4.gateway {{ target_gateway }}
        nmcli con mod "$IFACE" ipv4.dns "8.8.8.8 1.1.1.1"
        nmcli con mod "$IFACE" ipv4.method manual

        nmcli con down "$IFACE"
        nmcli con up "$IFACE"
      args:
        executable: /bin/bash
      delegate_to: new_vm

    - name: Wait for VM to be ready
      wait_for_connection:
        delay: 30
        timeout: 600
      delegate_to: new_vm

    - name: Remove temporary cloud-init file
      file:
        path: "{{ sysprep_path }}"
        state: absent


# =========================================
# CONFIGURE VM (AWX BOOTSTRAP)
# =========================================

- name: Bootstrap Linux Node for AWX
  hosts: new_vm
  become: yes

  vars:
    ansible_user_name: "ansible"
    awx_pub_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBEuxy3oDAAUDqVY4pDOISchf5DDrU491kluibL64HqK awx-ansible"

  tasks:

    - name: Create ansible user
      user:
        name: "{{ ansible_user_name }}"
        shell: /bin/bash
        create_home: yes

    - name: Add SSH public key
      authorized_key:
        user: "{{ ansible_user_name }}"
        key: "{{ awx_pub_key }}"

    - name: Enable passwordless sudo
      copy:
        dest: "/etc/sudoers.d/{{ ansible_user_name }}"
        content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Ensure PubkeyAuthentication is enabled
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
      notify: restart ssh

  handlers:
    - name: restart ssh
      service:
        name: sshd
        state: restarted
