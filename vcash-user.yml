---
- name: Rename SeifSemad to SeifEmad
  hosts: all
  become: yes
  vars:
    old_name: "SeifSemad"
    new_name: "SeifEmad"

  tasks:
    - name: "Step 1: Change the username"
      ansible.builtin.command: "usermod -l {{ new_name }} {{ old_name }}"
      register: rename_user
      failed_when: rename_user.rc != 0 and rename_user.rc != 9 # 9 means user doesn't exist (already renamed)

    - name: "Step 2: Rename the primary group"
      ansible.builtin.command: "groupmod -n {{ new_name }} {{ old_name }}"
      when: rename_user.changed

    - name: "Step 3: Move and rename the home directory"
      ansible.builtin.command: "usermod -d /home/{{ new_name }} -m {{ new_name }}"
      when: rename_user.changed

    - name: "Step 4: Ensure permissions are correct on the new home path"
      ansible.builtin.file:
        path: "/home/{{ new_name }}"
        state: directory
        owner: "{{ new_name }}"
        group: "{{ new_name }}"
        mode: '0700'

    - name: Verify the rename
      ansible.builtin.shell: "id {{ new_name }} && ls -ld /home/{{ new_name }}"
      register: final_check
      changed_when: false

    - name: Show Results
      ansible.builtin.debug:
        msg: "{{ final_check.stdout }}"
