---
- name: Create Administrative User with Home Directory
  hosts: all
  become: yes
  tasks:
    - name: Create user MohanedMohamed with sudo access and home folder
      ansible.builtin.user:
        name: MohanedMohamed
        # Hashes the plain-text password for Linux compatibility
        password: "{{ 'PASSWORD: !T$ec&@19*0?1' | password_hash('sha512') }}"
        shell: /bin/bash
        groups: sudo  # Change to 'wheel' if on RHEL/CentOS/Nutanix
        append: yes
        state: present
        create_home: yes  # This explicitly creates /home/MohanedMohamed
        home: /home/MohanedMohamed
 
    - name: Set correct permissions on the home directory
      ansible.builtin.file:
        path: /home/MohanedMohamed
        owner: MohanedMohamed
        group: MohanedMohamed
        mode: '0755'
        state: directory
