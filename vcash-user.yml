---
- name: Create Private Read-Only Users
  hosts: vcash-leg*
  become: yes
  vars:
    new_users:
      - { name: "AhmedEltartoushy", pass: "./T@rt0u#Y@E!" }
      #- { name: "Seif",    pass: "!$Tr@ct!n0101" }
      #- { name: "Yara",    pass: "%@te?cH!y0#01" }
      #- { name: "Zeinab",  pass: "e#eZ@ban!1?%" }

  tasks:
    - name: Ensure users exist without sudo privileges
      ansible.builtin.user:
        name: "{{ item.name }}"
        password: "{{ item.pass | password_hash('sha512') }}"
        shell: /bin/bash
        state: present
        create_home: yes
        groups: []
        append: no
      loop: "{{ new_users }}"  # This line MUST be here and aligned with 'ansible.builtin.user'

    - name: Restrict home directories so users cannot see each other's files
      ansible.builtin.file:
        path: "/home/{{ item.name }}"
        mode: '0700'
        owner: "{{ item.name }}"
        group: "{{ item.name }}"
      loop: "{{ new_users }}"

    - name: Verify permissions
      ansible.builtin.shell: "ls -ld /home/{{ item.name }}"
      register: ls_output
      loop: "{{ new_users }}"
      changed_when: false

    - name: Show Permission Results
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ ls_output.results }}"
