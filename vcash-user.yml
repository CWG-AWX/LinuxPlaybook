---
- name: Fix Typo - Delete SeifSemad and Create SeifEmad
  hosts: vcash-leg*
  become: yes
  vars:
    # Defining the fix here
    old_user: "SeifSemad"
    new_user_name: "SeifEmad"
    new_user_pass: "!$Tr@ct!n0101"

  tasks:
    - name: Remove the incorrect user and their home directory
      ansible.builtin.user:
        name: "{{ old_user }}"
        state: absent
        remove: yes  # This deletes /home/SeifSemad as well
        force: yes   # Forces deletion even if the user is logged in

    - name: Create the correct user (SeifEmad)
      ansible.builtin.user:
        name: "{{ new_user_name }}"
        password: "{{ new_user_pass | password_hash('sha512') }}"
        shell: /bin/bash
        state: present
        create_home: yes
        groups: []
        append: no

    - name: Restrict home directory for SeifEmad
      ansible.builtin.file:
        path: "/home/{{ new_user_name }}"
        mode: '0700'
        owner: "{{ new_user_name }}"
        group: "{{ new_user_name }}"

    - name: Verify the change
      ansible.builtin.shell: "id {{ new_user_name }} && ls -ld /home/{{ new_user_name }}"
      register: verify_fix
      changed_when: false

    - name: Show Verification
      ansible.builtin.debug:
        msg: "{{ verify_fix.stdout }}"
