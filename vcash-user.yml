---
- name: Create Read-Only Users on Legacy Hosts
  hosts: all
  become: yes
  vars:
    new_users:
      - { name: "Madonna", pass: "#D@20@nf$!m&??" }
      - { name: "Seif",    pass: "!$Tr@ct!n0101" }
      - { name: "Yara",    pass: "%@te?cH!y0#01" }
      - { name: "Zeinab",  pass: "e#eZ@ban!1?%" }

  tasks:
    - name: Ensure users exist without sudo privileges
      ansible.builtin.user:
        name: "{{ item.name }}"
        # Password is hashed at runtime for security
        password: "{{ item.pass | password_hash('sha512') }}"
        shell: /bin/bash
        state: present
        create_home: yes
        # Explicitly excluding sudo/wheel groups to ensure no admin access
        groups: []
        append: no

    - name: Verify no sudo access for the new users
      ansible.builtin.shell: "groups {{ item.name }}"
      register: group_check
      loop: "{{ new_users }}"
      changed_when: false

    - name: Display group status
      ansible.builtin.debug:
        msg: "User {{ item.item.name }} belongs to: {{ item.stdout }}"
      loop: "{{ group_check.results }}"
