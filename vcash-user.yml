---
- name: Create Private Read-Only Users via AWX Survey
  hosts: all
  become: yes
  vars:
    # This variable will come from the AWX Survey
    # Expected format: 
    # - { name: "user1", pass: "pass1" }
    # - { name: "user2", pass: "pass2" }
    final_user_list: "{{ survey_user_data | from_yaml }}"

  tasks:
    - name: Ensure users exist without sudo privileges
      ansible.builtin.user:
        name: "{{ item.name }}"
        password: "{{ item.pass | password_hash('sha512') }}"
        shell: /bin/bash
        state: present
        create_home: yes
        groups: []
        append: no
      loop: "{{ final_user_list }}"

    - name: Restrict home directories (0700)
      ansible.builtin.file:
        path: "/home/{{ item.name }}"
        mode: '0700'
        owner: "{{ item.name }}"
        group: "{{ item.name }}"
      loop: "{{ final_user_list }}"

    - name: Verify permissions
      ansible.builtin.shell: "ls -ld /home/{{ item.name }}"
      register: ls_output
      loop: "{{ final_user_list }}"
      changed_when: false

    - name: Show Results
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ ls_output.results }}"
