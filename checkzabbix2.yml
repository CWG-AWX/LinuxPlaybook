---
- name: Check if Zabbix Agent is installed on Linux servers
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    - name: Check if zabbix-agent package is installed (RPM-based systems)
      shell: |
        rpm -q zabbix-agent zabbix-agent2 2>/dev/null
      register: zabbix_rpm
      failed_when: false
      changed_when: false
      when: ansible_os_family in ['RedHat', 'Rocky', 'AlmaLinux', 'OracleLinux', 'Suse']

    - name: Check if zabbix-agent package is installed (Debian-based systems)
      shell: |
        dpkg -l | egrep '^ii\s+(zabbix-agent|zabbix-agent2)\s'
      register: zabbix_dpkg
      failed_when: false
      changed_when: false
      when: ansible_os_family == 'Debian'

    - name: Determine whether Zabbix is installed
      set_fact:
        zabbix_installed: >-
          {{
            (zabbix_rpm is defined and zabbix_rpm.rc == 0) or
            (zabbix_dpkg is defined and zabbix_dpkg.rc == 0)
          }}

    - name: Show status for each host
      debug:
        msg: >-
          Host {{ ansible_hostname }}:
          {{ 'Zabbix is installed' if zabbix_installed else 'Zabbix is NOT installed' }}

    - name: Add hosts without Zabbix to a dynamic group
      group_by:
        key: no_zabbix
      when: not zabbix_installed

- name: Report hosts without Zabbix installed
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Display hostnames missing Zabbix
      debug:
        msg: |
          Hosts without Zabbix installed:
          {% if groups['no_zabbix'] is defined %}
          {% for host in groups['no_zabbix'] %}
          - {{ host }}
          {% endfor %}
          {% else %}
          All servers have Zabbix installed.
          {% endif %}
