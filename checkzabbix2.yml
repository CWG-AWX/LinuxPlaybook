- name: Check Zabbix Agent installation
  hosts: all
  become: yes
  gather_facts: no
  ignore_unreachable: true

  tasks:
    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Set Zabbix installation status
      ansible.builtin.set_fact:
        zabbix_installed: "{{ ('zabbix-agent' in ansible_facts.packages) or ('zabbix-agent2' in ansible_facts.packages) }}"
      when: ansible_facts.packages is defined

    - name: Add hosts without Zabbix to dynamic group
      ansible.builtin.group_by:
        key: zabbix_missing
      when: zabbix_installed is not defined or not zabbix_installed

- name: Report hosts missing Zabbix
  hosts: localhost
  gather_facts: no
  run_once: true

  tasks:
    - name: Display hostnames missing Zabbix
      ansible.builtin.debug:
        msg: |
          Hosts without Zabbix installed:
          {% if groups['zabbix_missing'] is defined and groups['zabbix_missing'] | length > 0 %}
          {% for host in groups['zabbix_missing'] %}
          - {{ hostvars[host].ansible_hostname | default(host) }}
          {% endfor %}
          {% else %}
          All reachable servers have Zabbix installed.
          {% endif %}
