---
- name: Identify hosts missing Zabbix Agent
  hosts: all
  gather_facts: yes
  ignore_unreachable: yes  # Automatically skips unreachable hosts without failing the play

  tasks:
    - name: Check if zabbix-agent or zabbix-agent2 is installed
      package_facts:
        manager: auto

    - name: Set a fact if Zabbix is missing
      set_fact:
        zabbix_missing: "{{ 'zabbix-agent' not in ansible_facts.packages and 'zabbix-agent2' not in ansible_facts.packages }}"

    - name: Display missing hosts at the end of the play
      run_once: true
      debug:
        msg: >
          The following hosts do not have zabbix-agent or zabbix-agent2 installed:
          {{ ansible_play_hosts | map('extract', hostvars) | selectattr('zabbix_missing', 'defined') | selectattr('zabbix_missing', 'equalto', true) | map(attribute='inventory_hostname') | list }}
