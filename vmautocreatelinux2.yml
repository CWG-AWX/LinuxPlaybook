---
- name: Deploy RHEL 9 VM (Static IP - Nutanix + AWX Ready)
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    # --- NUTANIX AUTH ---
    nutanix_host: "10.20.24.111"
    nutanix_user: "michael"
    nutanix_pass: "Obateru@123"

    # --- INFRA ---
    cluster_uuid: "0005e57d-dfbe-c16d-781a-7cc255073a55"
    subnet_uuid: "dc503076-5c86-43b3-a19f-d1d02a92359f"
    image_uuid: "5ea85426-1c3e-42a5-9b45-fb1fd91fdcbc"

    # --- PROVIDED VIA AWX SURVEY ---
    # vm_name: ""
    # vm_hostname: ""
    # target_ip: ""
    # target_gateway: ""
    netmask: "24"

    sysprep_path: "/tmp/cloud-init-{{ vm_name }}.yaml"

  tasks:
    - name: Create cloud-init config
      copy:
        dest: "{{ sysprep_path }}"
        content: |
          #cloud-config
          hostname: "{{ vm_hostname }}"
          users:
            - name: Administrator
              groups: wheel
              shell: /bin/bash
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false

          chpasswd:
            list: |
              Administrator:cwg@2026
            expire: false

          ssh_pwauth: true

          runcmd:
            - |
              bash -c '
              IFACE=$(nmcli -t -f DEVICE dev | grep -v "lo" | head -n 1)
              for conn in $(nmcli -t -f NAME connection show); do nmcli connection delete "$conn"; done
              nmcli con add type ethernet con-name static-ip ifname "$IFACE" ipv4.addresses {{ target_ip }}/{{ netmask }} ipv4.gateway {{ target_gateway }} ipv4.dns "8.8.8.8,1.1.1.1" ipv4.method manual
              nmcli con up static-ip
              '
            - systemctl enable sshd --now

    - name: Deploy VM
      nutanix.ncp.ntnx_vms:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        state: present
        name: "{{ vm_name }}"
        cluster:
          uuid: "{{ cluster_uuid }}"
        networks:
          - is_connected: true
            subnet:
              uuid: "{{ subnet_uuid }}"
        disks:
          - type: DISK
            bus: SCSI
            clone_image:
              uuid: "{{ image_uuid }}"
        guest_customization:
          type: cloud_init
          script: "{{ lookup('file', sysprep_path) }}"

    - name: Add VM to inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ target_ip }}"
        ansible_user: Administrator
        ansible_password: "cwg@2026"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Wait for VM to be ready
      wait_for_connection:
        delay: 45
        timeout: 120
      delegate_to: "{{ vm_name }}"

    - name: Remove temporary cloud-init file
      file:
        path: "{{ sysprep_path }}"
        state: absent

# =========================================
# CONFIGURE VM (AWX BOOTSTRAP)
# =========================================

- name: Bootstrap Linux Node for AWX
  hosts: "{{ vm_name }}"
  become: yes

  vars:
    ansible_user_name: "ansible"
    awx_pub_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBEuxy3oDAAUDqVY4pDOISchf5DDrU491kluibL64HqK awx-ansible"

  tasks:
    - name: Create ansible user
      user:
        name: "{{ ansible_user_name }}"
        shell: /bin/bash
        create_home: yes

    - name: Add SSH public key
      authorized_key:
        user: "{{ ansible_user_name }}"
        key: "{{ awx_pub_key }}"

    - name: Enable passwordless sudo
      copy:
        dest: "/etc/sudoers.d/{{ ansible_user_name }}"
        content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Ensure PubkeyAuthentication is enabled
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
      notify: restart ssh

  handlers:
    - name: restart ssh
      service:
        name: sshd
        state: restarted
