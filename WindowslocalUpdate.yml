---
- name: Windows Multi-Host Security Patching & Audit Reporting (File-Based Patch)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"  # UPDATE to your actual .msu file
    # We'll copy to a simple, privileged path to avoid issues
    remote_temp_dir: "C:\\Windows\\Temp"
    remote_patch_path: "{{ remote_temp_dir }}\\patch_install.msu"
    
    # --- REPORTING & SMTP CONFIG ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com, michael.obateru@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:
    # ============================================================
    # COPY PLAYBOOK SNIPPET (ADAPTED FOR SIMPLER PATH)
    # ============================================================
    - name: Set the destination path dynamically (simple temp path)
      set_fact:
        dest_path: "{{ remote_patch_path }}"

    - name: Ensure the patch file exists on the AWX side
      delegate_to: localhost
      stat:
        path: "{{ src_patch }}"
      register: local_file

    - name: Fail if the mount is not working
      fail:
        msg: "The path {{ src_patch }} is not visible. Check your Pod Spec Override."
      when: not local_file.stat.exists

    - name: Ensure remote temp directory exists
      win_file:
        path: "{{ remote_temp_dir }}"
        state: directory

    - name: Copy patch file to Windows Temp folder
      win_copy:
        src: "{{ src_patch }}"
        dest: "{{ dest_path }}"
      register: copy_res

    - name: Show the result
      debug:
        msg: "File successfully copied to {{ dest_path }}"
      when: copy_res.changed

    # ============================================================
    # PATCH INSTALLATION LOGIC (FIXED FOR RC 5)
    # ============================================================
    - name: 1. Initialize reporting variables
      set_fact:
        patch_status: "No action taken"
        reboot_status: "No reboot performed"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"
        full_os_name: "{{ ansible_distribution | default('Windows') }} {{ ansible_distribution_version | default(ansible_os_version) }}"
        kb_number: ""  # Will extract from filename if possible

    - name: Extract KB number from filename (for pre-check)
      set_fact:
        kb_number: "{{ dest_path | regex_search('kb[0-9]+', ignorecase=True) | default('') | lower }}"
      when: copy_res.changed

    - name: 2. Install the Windows Patch File
      block:
        # Pre-check: Is this KB already installed?
        - name: Check if KB is already installed via Get-HotFix
          win_shell: |
            $kb = "{{ kb_number }}"
            if ($kb -and (Get-HotFix -Id $kb -ErrorAction SilentlyContinue)) {
                Write-Output "ALREADY_INSTALLED"
                exit 0
            } else {
                exit 1
            }
          register: hotfix_check
          changed_when: false
          failed_when: false
          when: kb_number != ""

        - name: Skip install if KB already present
          set_fact:
            patch_status: "Success (patch already installed)"
          when: 
            - kb_number != ""
            - hotfix_check.stdout is defined
            - "'ALREADY_INSTALLED' in hotfix_check.stdout"

        # Main install task
        - name: Install .msu patch via wusa.exe
          win_command: >
            wusa.exe "{{ dest_path }}" /quiet /norestart
          become: yes
          become_method: runas
          become_user: "{{ ansible_user }}"
          register: install_result
          register: install_result
          when: 
            - copy_res.changed
            - dest_path | lower | regex_search('\.msu$')
            - patch_status != "Success (patch already installed)"
          failed_when: >
            install_result.rc != 0 and 
            install_result.rc not in [0, 3010, 17021]
          # RC meanings:
          # 0 = Success
          # 3010 = Success, reboot required
          # 17021 = Already installed (sometimes returned by wusa)
          # 5 = Access Denied (handled in rescue)
          # 87 = Invalid parameter

        - name: Record successful installation
          set_fact:
            patch_status: "Success (1 patch installed)"
          when: 
            - install_result.rc is defined
            - install_result.rc in [0, 3010, 17021]

        # Check for pending reboot via registry
        - name: Check if reboot is required post-install (via registry)
          win_shell: |
            $rebootPending = $false
            if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") { $rebootPending = $true }
            if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") { $rebootPending = $true }
            if (Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager" -Name PendingFileRenameOperations -ErrorAction SilentlyContinue) { $rebootPending = $true }
            if ($rebootPending) { exit 3010 } else { exit 0 }
          register: reboot_check
          changed_when: false
          failed_when: false
          when: install_result.rc is defined and install_result.rc in [0, 3010]

        - name: Reboot if required
          win_reboot:
            reboot_timeout: 600
            pre_reboot_delay: 10
            post_reboot_delay: 30
          register: reboot_result
          when: 
            - install_result.rc == 3010 or reboot_check.rc == 3010
          
        - name: Update reboot status
          set_fact:
            reboot_status: "Reboot Completed"
          when: reboot_result is defined and reboot_result.rebooted | default(false)

      rescue:
        - name: Handle installation failures with detailed diagnostics
          block:
            - name: Gather diagnostic info on failure
              win_shell: |
                $info = @{}
                $info.User = [Security.Principal.WindowsIdentity]::GetCurrent().Name
                $info.IsAdmin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
                $info.OS = (Get-WmiObject Win32_OperatingSystem).Caption
                $info.Arch = (Get-WmiObject Win32_OperatingSystem).OSArchitecture
                $info | ConvertTo-Json
              register: diag_info
              changed_when: false
              failed_when: false

            - name: Set detailed failure message
              set_fact:
                patch_status: "Failed (RC {{ install_result.rc | default('N/A') }}): {{ 
                  'Access Denied - ensure ansible_svc is local Admin' if install_result.rc == 5 else
                  'Patch not applicable to this OS' if install_result.rc == 87 else
                  ansible_failed_result.msg | default('Unknown error')
                }}"
                reboot_status: "Error - installation failed"
                failure_diagnostics: "{{ diag_info.stdout | default('No diagnostics available') }}"

            - name: Show failure diagnostics (debug)
              debug:
                msg: "INSTALL FAILED - Diagnostics: {{ failure_diagnostics }}"

    - name: Cleanup Patch Installer
      win_file:
        path: "{{ dest_path }}"
        state: absent
      when: copy_res.changed
      ignore_errors: yes

    # ============================================================
    # REPORT GENERATION & SMTP (EXACT AS REQUESTED)
    # ============================================================
    - name: 3. Create CSV Header
      run_once: true
      delegate_to: localhost
      become: no
      copy:
        dest: "{{ report_file }}"
        content: "Hostname,IP_Address,OS_Version,Patch_Status,Reboot_Action,Timestamp\n"
      ignore_errors: yes

    - name: 4. Append host data to CSV
      delegate_to: localhost
      become: no
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }},{{ reporting_ip }},{{ full_os_name }},{{ patch_status }},{{ reboot_status }},{{ lookup('pipe','date --iso-8601=seconds') }}"
      ignore_errors: yes

    - name: 5. Email Final Report
      run_once: true
      delegate_to: localhost
      become: no
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Patching Report Complete"
        body: "Hi Team, Kindly note that Windows patching cycle is complete. See attached csv file for patch report."
        attach: "{{ report_file }}"
      when: report_file is exists
      ignore_errors: yes
