---
- name: Windows Multi-Host Security Patching (Prism Element v2.0 Version)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:/Windows/Temp"
    remote_patch_path: "{{ remote_temp_dir }}/patch_install.msu"
    
    # --- NUTANIX CONFIG (Prism Element) ---
    nutanix_host: "10.20.24.5" 
    nutanix_user: "michael" 
    nutanix_pass: "Oba@2024"
    snap_name: "PrePatch_{{ inventory_hostname | replace('.', '_') }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    # --- REPORTING & SMTP ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"
    # Ensure this matches your vault variable name
    smtp_password: "{{ vault_smtp_password }}"

  tasks:
    # ============================================================
    # 1. PRE-CHECK & UUID GATHERING
    # ============================================================
    - name: Get Nutanix VM UUID
      nutanix.ncp.ntnx_vms_info:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        filter:
          vm_name: "{{ ntnx_name | default(inventory_hostname) }}"
      delegate_to: localhost
      register: vm_details

    - name: Set VM UUID Fact
      set_fact:
        ntnx_uuid: "{{ (vm_details.response.entities[0].metadata.uuid) if vm_details.response is defined else (vm_details.entities[0].metadata.uuid) }}"

    - name: Create Pre-Patch Snapshot (v2.0)
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots"
        method: POST
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
        body_format: json
        body:
          snapshot_specs:
            - vm_uuid: "{{ ntnx_uuid }}"
              snapshot_name: "{{ snap_name }}"
      delegate_to: localhost
      register: v2_snap_info

    # ============================================================
    # 2. INSTALLATION & VALIDATION BLOCK
    # ============================================================
    - name: Main Patching Logic
      block:
        - name: Copy Patch to Host
          win_copy:
            src: "{{ src_patch }}"
            dest: "{{ remote_patch_path }}"

        - name: Execute WUSA Installation (The Fix for RC 5)
          win_command: "wusa.exe {{ remote_patch_path }} /quiet /norestart"
          become: yes
          become_method: runas
          become_user: ansible_svc
          async: 3600
          poll: 30
          register: install_result
          failed_when: "install_result.rc not in [0, 3010, 2359302]"

        - name: Handle Reboot
          win_reboot:
            reboot_timeout: 1200
          when: install_result.rc == 3010

      # ============================================================
      # 3. AUTOMATED ROLLBACK (RESCUE)
      # ============================================================
      rescue:
        - name: Power Off VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_off"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Revert to Snapshot
          uri:
            url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots/{{ v2_snap_info.json.task_uuid }}/restore"
            method: POST
            user: "{{ nutanix_user }}"
            password: "{{ nutanix_pass }}"
            force_basic_auth: yes
            validate_certs: false
            body: {}
          delegate_to: localhost
          when: v2_snap_info.json.task_uuid is defined

        - name: Power On VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_on"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

    # ============================================================
    # 4. REPORTING
    # ============================================================
    - name: Send Email Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "WINDOWS PATCHING REPORT"
        body: "Patching cycle complete."
