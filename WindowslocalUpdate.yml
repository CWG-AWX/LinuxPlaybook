---
- name: Windows Multi-Host Security Patching & Port Audit (PE v2.0)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:\\Windows\\Temp"
    remote_patch_path: "{{ remote_temp_dir }}\\patch_install.msu"
    
    # --- NUTANIX CONFIG (Prism Element) ---
    nutanix_host: "10.20.24.5" 
    nutanix_user: "michael" 
    nutanix_pass: "Oba@2024"
    snap_name: "PrePatch_{{ inventory_hostname | replace('.', '_') }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    # --- REPORTING & SMTP ---
    report_file: "/tmp/windows_patch_audit_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "blaizymike@gmail.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:
    # ============================================================
    # PHASE 1: PRE-CHECK AUDIT & UUID GATHERING
    # ============================================================
    - name: Get VM UUID via Direct API
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/vms/?filter=vm_name%3D%3D{{ inventory_hostname }}"
        method: GET
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
      delegate_to: localhost
      register: vm_search

    - name: Audit Pre-Patch System State
      win_shell: |
        $ports = Get-NetTCPConnection -State Listen | Select-Object -ExpandProperty LocalPort | Sort-Object -Unique
        $lastKB = Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 1
        Write-Output "$($ports -join ',');$($lastKB.HotFixID);$($lastKB.InstalledOn)"
      register: pre_audit_raw

    - name: Set System Facts
      set_fact:
        ntnx_uuid: "{{ vm_search.json.entities[0].uuid }}"
        pre_ports: "{{ pre_audit_raw.stdout.split(';')[0] }}"
        prev_kb: "{{ pre_audit_raw.stdout.split(';')[1] | default('N/A') }}"
        prev_kb_date: "{{ pre_audit_raw.stdout.split(';')[2] | default('N/A') }}"
        target_kb: "{{ src_patch | regex_search('kb[0-9]+', ignorecase=True) | default('KB5075906') | upper }}"
        patch_status: "Pending"
        recovery_action: "None"

    - name: "DEBUG: Pre-Patch Listening Ports"
      debug:
        msg: "The following ports are LISTENING before patching: {{ pre_ports }}"

    - name: Create Safety Snapshot (v2.0)
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots"
        method: POST
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
        body_format: json
        status_code: [200, 201, 202]
        body:
          snapshot_specs:
            - vm_uuid: "{{ ntnx_uuid }}"
              snapshot_name: "{{ snap_name }}"
      delegate_to: localhost
      register: v2_snap_info

    # ============================================================
    # PHASE 2: INSTALLATION & POST-PATCH VALIDATION
    # ============================================================
    - name: Main Patching Logic
      block:
        - name: Copy Patch to Windows Host
          win_copy:
            src: "{{ src_patch }}"
            dest: "{{ remote_patch_path }}"

        - name: Execute WUSA Installation
          win_command: "wusa.exe {{ remote_patch_path }} /quiet /norestart"
          become: yes
          become_method: runas
          become_user: ansible_svc
          register: install_result
          failed_when: "install_result.rc not in [0, 3010, 2359302]"

        - name: Handle Reboot
          win_reboot:
            reboot_timeout: 1200
          when: install_result.rc == 3010

        - name: Validate Listening Ports (Retrying for startup)
          win_shell: |
            $pre = "{{ pre_ports }}".Split(',')
            $post = Get-NetTCPConnection -State Listen | Select-Object -ExpandProperty LocalPort
            foreach ($p in $pre) { if ($p -and ($p -notin $post)) { exit 1 } }
            # If we reach here, all pre-patch ports are back. Return the list.
            Write-Output ($post -join ',')
          register: post_port_check
          retries: 15
          delay: 30
          until: post_port_check.rc == 0

        - name: "DEBUG: Post-Patch Listening Ports"
          debug:
            msg: "The following ports are CONFIRMED LISTENING after patching: {{ post_port_check.stdout }}"

        - name: Mark Success
          set_fact:
            patch_status: "Success (Ports Verified)"
            post_ports_csv: "{{ post_port_check.stdout }}"

      # ============================================================
      # PHASE 3: RECOVERY PHASE (ROLLBACK)
      # ============================================================
      rescue:
        - name: Shutdown Instance (Rollback Initiation)
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            state: "power_off"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Restore VM to Pre-Patch Snapshot
          uri:
            url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots/{{ v2_snap_info.json.task_uuid }}/restore"
            method: POST
            user: "{{ nutanix_user }}"
            password: "{{ nutanix_pass }}"
            force_basic_auth: yes
            validate_certs: false
            body: {}
          delegate_to: localhost

        - name: Instance Re-activation
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            state: "power_on"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Log Rollback Event
          set_fact:
            patch_status: "FAILED"
            recovery_action: "Automatic Rollback (Port Validation Failed)"
            post_ports_csv: "RECOVERY_MODE"

    # ============================================================
    # PHASE 4: REPORTING & SMTP
    # ============================================================
    - name: Create Audit CSV Header
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ report_file }}"
        content: "\"Hostname\",\"Prev_KB\",\"Target_KB\",\"Status\",\"Pre_Port_Count\",\"Post_Port_Count\",\"Recovery\",\"Timestamp\"\n"

    - name: Append data to CSV
      delegate_to: localhost
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "\"{{ inventory_hostname }}\",\"{{ prev_kb }}\",\"{{ target_kb }}\",\"{{ patch_status }}\",\"{{ pre_ports.split(',') | length }}\",\"{{ post_ports_csv.split(',') | length }}\",\"{{ recovery_action }}\",\"{{ lookup('pipe','date --iso-8601=seconds') }}\""

    - name: Email Final Audit Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Full Port Validation Complete"
        body: "Windows patching cycle complete. Ports were verified pre and post-patch to ensure service availability."
        attach: "{{ report_file }}"
