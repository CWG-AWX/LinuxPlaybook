---
- name: Windows Multi-Host Security Patching (Nutanix v2.0 API & Audit Version)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:/Windows/Temp"
    remote_patch_path: "{{ remote_temp_dir }}/patch_install.msu"
    
    # --- NUTANIX CONFIG ---
    nutanix_host: "10.20.24.5" 
    nutanix_user: "michael" 
    nutanix_pass: "Oba@2024"
    snap_name: "PrePatch_{{ inventory_hostname | replace('.', '_') }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    # --- REPORTING & SMTP ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:
    # ============================================================
    # 1. AUDIT & PREPARATION
    # ============================================================
    - name: Initialize reporting variables
      set_fact:
        patch_status: "No action taken"
        reboot_status: "No reboot performed"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"
        full_os_name: "{{ ansible_distribution | default('Windows') }} {{ ansible_distribution_version | default(ansible_os_version) }}"
        kb_number: "{{ src_patch | regex_search('kb[0-9]+', ignorecase=True) | default('KB5075906') | lower }}"
        previous_kb: "N/A"
        previous_kb_date: "N/A"
        new_kb_installed_on: "N/A"

    - name: Get last installed Windows update (Audit)
      win_shell: |
        $last = Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 1
        if ($last) { "$($last.HotFixID)|$($last.InstalledOn)" }
      register: previous_patch_info
      changed_when: false

    - name: Parse previous patch details
      set_fact:
        previous_kb: "{{ previous_patch_info.stdout.split('|')[0] | default('N/A') }}"
        previous_kb_date: "{{ previous_patch_info.stdout.split('|')[1] | default('N/A') }}"
      when: previous_patch_info.stdout is defined and previous_patch_info.stdout != ""

    - name: Get Nutanix VM UUID
      nutanix.ncp.ntnx_vms_info:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_user }}"
        nutanix_password: "{{ nutanix_pass }}"
        validate_certs: false
        filter:
          vm_name: "{{ ntnx_name | default(inventory_hostname) }}"
      delegate_to: localhost
      register: vm_details

    - name: Set VM UUID Fact
      set_fact:
        ntnx_uuid: "{{ (vm_details.response.entities[0].metadata.uuid) if (vm_details.response is defined and vm_details.response.entities | length > 0) else (vm_details.entities[0].metadata.uuid) }}"

    # ============================================================
    # 2. NUTANIX SNAPSHOT (v2.0 API)
    # ============================================================
    - name: Create Pre-Patch Snapshot
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots"
        method: POST
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
        body_format: json
        body:
          snapshot_specs:
            - vm_uuid: "{{ ntnx_uuid }}"
              snapshot_name: "{{ snap_name }}"
      delegate_to: localhost
      register: v2_snap_info

    - name: Wait for Snapshot Success
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/tasks/{{ v2_snap_info.json.task_uuid }}"
        method: GET
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
      delegate_to: localhost
      register: v2_task_status
      until: "v2_task_status.json.progress_status == 'Succeeded'"
      retries: 20
      delay: 10

    # ============================================================
    # 3. INSTALLATION & VALIDATION BLOCK
    # ============================================================
    - name: Main Patching Logic
      block:
        - name: Copy patch to Windows server
          win_copy:
            src: "{{ src_patch }}"
            dest: "{{ remote_patch_path }}"

        - name: Execute WUSA Installation (with Become for RC 5 Fix)
          win_command: "wusa.exe {{ remote_patch_path }} /quiet /norestart"
          become: yes
          become_method: runas
          become_user: ansible_svc
          async: 3600
          poll: 30
          register: install_result
          failed_when: "install_result.rc not in [0, 3010, 2359302, 17021]"

        - name: Interpret status
          set_fact:
            patch_status: >-
              {% if install_result.rc == 0 %}Success{% elif install_result.rc == 3010 %}Pending Reboot{% elif install_result.rc == 2359302 %}Already Installed{% else %}Not Applicable{% endif %}

        - name: Reboot if required
          win_reboot:
            reboot_timeout: 900
          register: reboot_result
          when: install_result.rc == 3010

        - name: Update reboot fact
          set_fact:
            reboot_status: "Reboot Completed"
          when: reboot_result is defined and reboot_result.rebooted | default(false)

        - name: Capture new patch date (Audit)
          win_shell: |
            $patch = Get-HotFix -Id "{{ kb_number }}" -ErrorAction SilentlyContinue
            if ($patch) { $patch.InstalledOn }
          register: new_patch_check
          changed_when: false

        - name: Set new KB date
          set_fact:
            new_kb_installed_on: "{{ new_patch_check.stdout | default('N/A') }}"

      # ============================================================
      # 4. AUTOMATED ROLLBACK (RESCUE)
      # ============================================================
      rescue:
        - name: Power Off VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_off"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Revert to Snapshot (v2.0 API Fix)
          uri:
            url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots/{{ v2_snap_info.json.snapshot_results[0].snapshot_uuid }}/restore"
            method: POST
            user: "{{ nutanix_user }}"
            password: "{{ nutanix_pass }}"
            force_basic_auth: yes
            validate_certs: false
            body: {}
          delegate_to: localhost
          when: v2_snap_info.json.snapshot_results is defined

        - name: Power On VM
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            validate_certs: false
            state: "power_on"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Wait for WinRM Recovery
          wait_for_connection:
            delay: 30
            timeout: 600

        - name: Mark Failure
          set_fact:
            patch_status: "FAILED - ROLLED BACK"

    # ============================================================
    # 5. REPORTING & CLEANUP
    # ============================================================
    - name: Cleanup remote patch
      win_file:
        path: "{{ remote_patch_path }}"
        state: absent
      ignore_errors: yes

    - name: Create CSV Header
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ report_file }}"
        content: "\"Hostname\",\"IP_Address\",\"OS_Version\",\"Previous_KB\",\"Previous_KB_Date\",\"New_KB\",\"New_KB_Installed_On\",\"Patch_Status\",\"Reboot_Action\",\"Timestamp\"\n"

    - name: Append data to CSV
      delegate_to: localhost
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "\"{{ inventory_hostname }}\",\"{{ reporting_ip }}\",\"{{ full_os_name }}\",\"{{ previous_kb }}\",\"{{ previous_kb_date }}\",\"{{ kb_number | upper }}\",\"{{ new_kb_installed_on }}\",\"{{ patch_status }}\",\"{{ reboot_status }}\",\"{{ lookup('pipe','date --iso-8601=seconds') }}\""

    - name: Email Final Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Patching Report Complete"
        body: "Windows patching cycle complete. See attached report."
        attach: "{{ report_file }}"
