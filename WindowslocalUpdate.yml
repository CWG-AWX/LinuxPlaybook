---
- name: Offline Windows Patch Deployment with Audit Report
  hosts: all
  gather_facts: yes

  vars:
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64.msu"
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:

    # ---------------- INITIALIZE REPORT VARIABLES ----------------

    - name: 1. Initialize reporting variables
      set_fact:
        patch_status: "Not Installed"
        reboot_status: "No reboot performed"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"
        full_os_name: "{{ ansible_distribution }} {{ ansible_distribution_version }}"

    # ---------------- VERIFY PATCH EXISTS ON AWX ----------------

    - name: Ensure patch exists on AWX side
      delegate_to: localhost
      stat:
        path: "{{ src_patch }}"
      register: local_file

    - name: Fail if patch is not visible
      fail:
        msg: "The path {{ src_patch }} is not visible. Check your Pod Spec Override."
      when: not local_file.stat.exists

    # ---------------- COPY + INSTALL PATCH ----------------

    - name: Create patch directory on Windows
      win_file:
        path: C:\Temp\Patch
        state: directory

    - name: Set destination path
      set_fact:
        dest_path: "C:\\Temp\\Patch\\windows10.0-kb5075906-x64.msu"

    - name: Copy patch to Windows server
      win_copy:
        src: "{{ src_patch }}"
        dest: "{{ dest_path }}"
      register: copy_res

    - name: Install Windows patch (.msu)
      win_hotfix:
        source: "{{ dest_path }}"
        state: present
      register: install_result

    - name: Record Installation Results
      set_fact:
        patch_status: "{{ 'Success' if install_result.changed else 'Already Installed' }}"
        reboot_status: "{{ 'Reboot Required' if install_result.reboot_required else 'No reboot needed' }}"

    - name: Reboot if required
      win_reboot:
        msg: "Rebooting after patch installation"
        reboot_timeout: 3600
      when: install_result.reboot_required

    - name: Handle Installation Failure
      rescue:
        - name: Set failure state
          set_fact:
            patch_status: "Failed"
            reboot_status: "Error during installation"

    # ---------------- REPORT GENERATION ----------------

    - name: 3. Create CSV Header
      run_once: true
      delegate_to: localhost
      become: no
      copy:
        dest: "{{ report_file }}"
        content: "Hostname,IP_Address,OS_Version,Patch_Status,Reboot_Action,Timestamp\n"

    - name: 4. Append host data to CSV
      delegate_to: localhost
      become: no
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }},{{ reporting_ip }},{{ full_os_name }},{{ patch_status }},{{ reboot_status }},{{ lookup('pipe','date --iso-8601=seconds') }}"
      ignore_errors: yes

    - name: 5. Email Final Report
      run_once: true
      delegate_to: localhost
      become: no
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS OFFLINE PATCH REPORT"
        body: "Hi Team, Kindly note that offline Windows patch deployment is complete. See attached csv file for patch report."
        attach: "{{ report_file }}"
      when: report_file is exists
