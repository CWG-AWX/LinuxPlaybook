---
- name: Windows Multi-Host Security Patching & Audit Reporting (File-Based Patch)
  hosts: all
  gather_facts: yes  # Required to find the User Profile path
  
  vars:
    # --- PATCH FILE CONFIG ---
    # Path inside the AWX Pod (linked to your host)
    # UPDATE THIS: Change to your actual patch filename (.msu/.exe/.msi)
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    
    # --- REPORTING & SMTP CONFIG (Exact from your playbook) ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"
    # password should be provided via vault: vault_smtp_password

  tasks:
    # ============================================================
    # EXACT COPY PLAYBOOK SNIPPET (AS PROVIDED BY USER) - UNCHANGED
    # ============================================================
    - name: Set the destination path dynamically
      set_fact:
        # This points to C:\Users\<Current_User>\Downloads
        dest_path: "{{ ansible_env.USERPROFILE }}\\Downloads\\windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"

    - name: Ensure the test file exists on the AWX side
      delegate_to: localhost
      stat:
        path: "{{ src_patch }}"
      register: local_file

    - name: Fail if the mount is not working
      fail:
        msg: "The path {{ src_patch }} is not visible. Check your Pod Spec Override."
      when: not local_file.stat.exists

    - name: Copy file from Host Mount to Windows Downloads
      win_copy:
        src: "{{ src_patch }}"
        dest: "{{ dest_path }}"
      register: copy_res

    - name: Show the result
      debug:
        msg: "File successfully copied to {{ dest_path }}"
      when: copy_res.changed

    # ============================================================
    # PATCH INSTALLATION & REBOOT LOGIC (FIXED)
    # ============================================================
    - name: 1. Initialize reporting variables
      set_fact:
        patch_status: "No action taken"
        reboot_status: "No reboot performed"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"
        full_os_name: "{{ ansible_distribution | default('Windows') }} {{ ansible_distribution_version | default(ansible_os_version) }}"

    - name: 2. Install the Windows Patch File
      block:
        - name: Install .msu patch (Windows Update Standalone Installer)
          win_command: >
            wusa.exe "{{ dest_path }}" /quiet /norestart
          register: install_result
          when: 
            - copy_res.changed
            - dest_path | lower | regex_search('\.msu$')
          failed_when: install_result.rc != 0 and install_result.rc != 3010

        - name: Install .exe patch (generic silent install)
          win_command: >
            "{{ dest_path }}" /S /quiet /norestart
          register: install_result
          when:
            - copy_res.changed
            - dest_path | lower | regex_search('\.exe$')
          failed_when: install_result.rc != 0 and install_result.rc != 3010

        - name: Install .msi patch (Windows Installer)
          win_command: >
            msiexec /i "{{ dest_path }}" /quiet /norestart
          register: install_result
          when:
            - copy_res.changed
            - dest_path | lower | regex_search('\.msi$')
          failed_when: install_result.rc != 0 and install_result.rc != 3010

        - name: Record successful installation
          set_fact:
            patch_status: "Success (1 patch installed)"
          when: install_result.rc is defined and (install_result.rc == 0 or install_result.rc == 3010)

        # ✅ FIXED: Check for pending reboot via PowerShell registry check
        - name: Check if reboot is required post-install (via registry)
          win_shell: |
            $rebootPending = $false
            # Check common pending reboot registry keys
            if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") { $rebootPending = $true }
            if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") { $rebootPending = $true }
            if (Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager" -Name PendingFileRenameOperations -ErrorAction SilentlyContinue) { $rebootPending = $true }
            if ($rebootPending) { exit 3010 } else { exit 0 }
          register: reboot_check
          changed_when: false
          failed_when: false
          when: install_result.rc is defined

        - name: Reboot if installer returned 3010 OR registry check indicates pending reboot
          win_reboot:
            reboot_timeout: 600
            pre_reboot_delay: 10
            post_reboot_delay: 30
          register: reboot_result
          when: 
            - install_result.rc == 3010 or reboot_check.rc == 3010
          
        - name: Update reboot status
          set_fact:
            reboot_status: "Reboot Completed"
          when: reboot_result is defined and reboot_result.rebooted | default(false)

      rescue:
        - name: Handle installation failures
          set_fact:
            patch_status: "Failed: {{ ansible_failed_result.msg | default('Unknown error') }}"
            reboot_status: "Error - installation failed"

    - name: Cleanup Patch Installer (optional)
      win_file:
        path: "{{ dest_path }}"
        state: absent
      when: copy_res.changed and patch_status | regex_search('Success')
      ignore_errors: yes

    # ============================================================
    # EXACT REPORT GENERATION & SMTP SECTION (PRESERVED)
    # ============================================================

    - name: 3. Create CSV Header
      run_once: true
      delegate_to: localhost
      become: no
      copy:
        dest: "{{ report_file }}"
        content: "Hostname,IP_Address,OS_Version,Patch_Status,Reboot_Action,Timestamp\n"
      ignore_errors: yes

    - name: 4. Append host data to CSV
      delegate_to: localhost
      become: no
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }},{{ reporting_ip }},{{ full_os_name }},{{ patch_status }},{{ reboot_status }},{{ lookup('pipe','date --iso-8601=seconds') }}"
      ignore_errors: yes

    - name: 5. Email Final Report
      run_once: true
      delegate_to: localhost
      become: no
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Patching Report Complete"
        body: "Hi Team, Kindly note that Windows patching cycle is complete. See attached csv file for patch report."
        attach: "{{ report_file }}"
      when: report_file is exists
      ignore_errors: yes
