---
- name: Windows Patching with Service-Port Mapping & Rollback Test
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:\\Windows\\Temp"
    remote_patch_path: "{{ remote_temp_dir }}\\patch_install.msu"
    
    # --- NUTANIX CONFIG ---
    nutanix_host: "10.20.24.5" 
    nutanix_user: "michael" 
    nutanix_pass: "Oba@2024"
    snap_name: "PrePatch_{{ inventory_hostname | replace('.', '_') }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    # --- REPORTING & SMTP ---
    report_file: "/tmp/windows_patch_audit_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "blaizymike@gmail.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:
    # ============================================================
    # PHASE 1: PRE-PATCH SERVICE & PORT AUDIT
    # ============================================================
    - name: Get VM UUID
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/vms/?filter=vm_name%3D%3D{{ inventory_hostname }}"
        method: GET
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
      delegate_to: localhost
      register: vm_search

    - name: Audit Pre-Patch Services and Ports
      win_shell: |
        $connections = Get-NetTCPConnection -State Listen
        $report = foreach ($conn in $connections) {
            $process = Get-Process -Id $conn.OwningProcess -ErrorAction SilentlyContinue
            "$($conn.LocalPort):$($process.Name)"
        }
        $lastKB = Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 1
        Write-Output "$(($report | Sort-Object -Unique) -join ',');$($lastKB.HotFixID)"
      register: pre_audit_raw

    - name: Set System Facts
      set_fact:
        ntnx_uuid: "{{ vm_search.json.entities[0].uuid }}"
        pre_service_map: "{{ pre_audit_raw.stdout.split(';')[0] }}"
        prev_kb: "{{ pre_audit_raw.stdout.split(';')[1] | default('N/A') }}"
        target_kb: "{{ src_patch | regex_search('kb[0-9]+', ignorecase=True) | default('KB5075906') | upper }}"
        patch_status: "Pending"

    - name: Create Safety Snapshot
      uri:
        url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots"
        method: POST
        user: "{{ nutanix_user }}"
        password: "{{ nutanix_pass }}"
        force_basic_auth: yes
        validate_certs: false
        body_format: json
        status_code: [200, 201, 202]
        body:
          snapshot_specs:
            - vm_uuid: "{{ ntnx_uuid }}"
              snapshot_name: "{{ snap_name }}"
      delegate_to: localhost
      register: v2_snap_info

    # ============================================================
    # PHASE 2: INSTALLATION & MAPPED VALIDATION
    # ============================================================
    - name: Main Patching Logic
      block:
        - name: Copy and Install Patch
          win_copy:
            src: "{{ src_patch }}"
            dest: "{{ remote_patch_path }}"

        - name: Execute WUSA
          win_command: "wusa.exe {{ remote_patch_path }} /quiet /norestart"
          become: yes
          become_method: runas
          become_user: ansible_svc
          register: install_result
          failed_when: "install_result.rc not in [0, 3010, 2359302]"

        - name: Handle Reboot
          win_reboot:
            reboot_timeout: 1200
          when: install_result.rc == 3010

        - name: Post-Patch Service/Port Mapping
          win_shell: |
            $pre_map = "{{ pre_service_map }}".Split(',')
            $post_conns = Get-NetTCPConnection -State Listen
            $post_map = foreach ($c in $post_conns) {
                $p = Get-Process -Id $c.OwningProcess -ErrorAction SilentlyContinue
                "$($c.LocalPort):$($p.Name)"
            }
            # Check if all pre-patch services are still here
            foreach ($item in $pre_map) {
                if ($item -and ($item -notin $post_map)) { exit 1 }
            }
            Write-Output (($post_map | Sort-Object -Unique) -join ' | ')
          register: post_audit
          retries: 15
          delay: 30
          until: post_audit.rc == 0

        - name: Mark Success
          set_fact:
            patch_status: "Success (All Services Verified)"
            final_service_list: "{{ post_audit.stdout }}"

      rescue:
        - name: LOG ROLLBACK (Automatic Trigger)
          set_fact:
            patch_status: "FAILED - TRIGGERING RESTORE"
            final_service_list: "SERVICE_MISSING_ERROR"

    # ============================================================
    # PHASE 3: REPORTING & SMTP
    # ============================================================
    - name: Create Audit CSV
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ report_file }}"
        content: "\"Hostname\",\"Prev_KB\",\"Target_KB\",\"Status\",\"Service_Port_Map\",\"Timestamp\"\n"

    - name: Append data to CSV
      delegate_to: localhost
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "\"{{ inventory_hostname }}\",\"{{ prev_kb }}\",\"{{ target_kb }}\",\"{{ patch_status }}\",\"{{ final_service_list }}\",\"{{ lookup('pipe','date --iso-8601=seconds') }}\""

    - name: Email Final Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Service Mapping Complete"
        body: "Attached is the audit report showing all active services and ports per host."
        attach: "{{ report_file }}"

    # ============================================================
    # PHASE 4: ROLLBACK VERIFICATION (MANUAL TEST TASK)
    # ============================================================
    # WARNING: This task is for testing your restore mechanism. 
    # It will restore the VM even if the patch succeeded.
    - name: "TESTING: Verify Rollback Mechanism"
      block:
        - name: Shutdown for Restore Test
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            state: "power_off"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost

        - name: Restore from Pre-Patch Snapshot
          uri:
            url: "https://{{ nutanix_host }}:9440/api/nutanix/v2.0/snapshots/{{ v2_snap_info.json.task_uuid }}/restore"
            method: POST
            user: "{{ nutanix_user }}"
            password: "{{ nutanix_pass }}"
            force_basic_auth: yes
            validate_certs: false
            body: {}
          delegate_to: localhost

        - name: Power On After Restore
          nutanix.ncp.ntnx_vms:
            nutanix_host: "{{ nutanix_host }}"
            nutanix_username: "{{ nutanix_user }}"
            nutanix_password: "{{ nutanix_pass }}"
            state: "power_on"
            vm_uuid: "{{ ntnx_uuid }}"
          delegate_to: localhost
      when: verify_rollback_test=true | default(false) # Trigger this by passing -e "verify_rollback_test=true"
