- name: Check services listening on port 443
  hosts: all
  gather_facts: no

  tasks:

    - name: Get service on port 443
      win_shell: |
        $conn = Get-NetTCPConnection -LocalPort 443 -State Listen -ErrorAction SilentlyContinue

        if ($conn) {
            foreach ($c in $conn) {
                $pid = $c.OwningProcess

                $proc = Get-CimInstance Win32_Process -Filter "ProcessId=$pid"
                $svc  = Get-CimInstance Win32_Service | Where-Object {$_.ProcessId -eq $pid}

                "Port: $($c.LocalPort)"
                "PID: $pid"
                "Process: $($proc.Name)"

                if ($svc) {
                    "Service: $($svc.Name)"
                    "DisplayName: $($svc.DisplayName)"
                }
                else {
                    "Service: Not a Windows service (likely an application process)"
                }

                ""
            }
        }
        else {
            "No service running on port 443"
        }
      register: result
      failed_when: false

    - debug:
        var: result.stdout_lines
