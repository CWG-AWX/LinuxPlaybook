---
- name: Get Windows services running on port 80
  hosts: all
  gather_facts: no

  tasks:

    - name: Find PID using port 80
      win_shell: |
        $port = Get-NetTCPConnection -LocalPort 80 -State Listen -ErrorAction SilentlyContinue
        if ($port) {
            $pid = $port.OwningProcess
            Get-WmiObject Win32_Service | Where-Object {$_.ProcessId -eq $pid} | Select Name,DisplayName,State
        }
      register: port80_service

    - name: Display services using port 80
      debug:
        var: port80_service.stdout_lines
