- name: Check services listening on port 443
  hosts: all
  gather_facts: no

  tasks:

    - name: Get service on port 443
      win_shell: |
        $conn = Get-NetTCPConnection -LocalPort 443 -State Listen -ErrorAction SilentlyContinue
        if ($conn) {
            $pid = $conn.OwningProcess
            $proc = Get-Process -Id $pid
            $svc = Get-WmiObject Win32_Service | Where-Object {$_.ProcessId -eq $pid}

            "Process: $($proc.ProcessName)"
            "Service: $($svc.Name)"
            "DisplayName: $($svc.DisplayName)"
        } else {
            "No service running on port 443"
        }
      register: result
      failed_when: false

    - debug:
        var: result.stdout_lines
