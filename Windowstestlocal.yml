---
- name: Windows Multi-Host Security Patching & Audit Reporting (File-Based Patch)
  hosts: all
  gather_facts: yes
  
  vars:
    # --- PATCH FILE CONFIG ---
    src_patch: "/mnt/updates/windows/windows10.0-kb5075906-x64_96e7590a40fbfde94dd84e3ed743ccd735f54654.msu"
    remote_temp_dir: "C:\\Windows\\Temp"
    remote_patch_path: "{{ remote_temp_dir }}\\patch_install.msu"
    
    # --- REPORTING & SMTP CONFIG ---
    report_file: "/tmp/windows_patch_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}.csv"
    email_recipient: "abdullateef.adekogbe@cwg-plc.com"
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "ignioservices@gmail.com"

  tasks:

    # ============================================================
    # PREPARATION & FILE COPY
    # ============================================================

    - name: Set destination path
      set_fact:
        dest_path: "{{ remote_patch_path }}"

    - name: Ensure patch file exists on AWX side
      delegate_to: localhost
      stat:
        path: "{{ src_patch }}"
      register: local_file

    - name: Fail if mount not visible
      fail:
        msg: "The path {{ src_patch }} is not visible. Check Pod Spec Override."
      when: not local_file.stat.exists

    - name: Ensure remote temp directory exists
      win_file:
        path: "{{ remote_temp_dir }}"
        state: directory

    - name: Copy patch to Windows server
      win_copy:
        src: "{{ src_patch }}"
        dest: "{{ dest_path }}"
      register: copy_res


    # ============================================================
    # INITIALIZE REPORTING VARIABLES
    # ============================================================

    - name: Initialize reporting variables
      set_fact:
        patch_status: "No action taken"
        reboot_status: "No reboot performed"
        reporting_ip: "{{ ansible_host | default(inventory_hostname) }}"
        full_os_name: "{{ ansible_distribution | default('Windows') }} {{ ansible_distribution_version | default(ansible_os_version) }}"
        kb_number: ""
        previous_kb: "N/A"
        previous_kb_date: "N/A"
        new_kb_installed_on: "N/A"


    # ============================================================
    # CAPTURE PREVIOUS INSTALLED PATCH
    # ============================================================

    - name: Get last installed Windows update
      win_shell: |
        $last = Get-HotFix |
                Sort-Object InstalledOn -Descending |
                Select-Object -First 1
        if ($last) {
            "$($last.HotFixID)|$($last.InstalledOn)"
        }
      register: previous_patch_info
      changed_when: false
      failed_when: false

    - name: Parse previous patch details
      set_fact:
        previous_kb: "{{ previous_patch_info.stdout.split('|')[0] | default('N/A') }}"
        previous_kb_date: "{{ previous_patch_info.stdout.split('|')[1] | default('N/A') }}"
      when: previous_patch_info.stdout is defined and previous_patch_info.stdout != ""


    # ============================================================
    # EXTRACT KB NUMBER
    # ============================================================

    - name: Extract KB number from filename
      set_fact:
        kb_number: "{{ dest_path | regex_search('kb[0-9]+', ignorecase=True) | default('') | lower }}"
      when: copy_res.changed


    # ============================================================
    # INSTALL PATCH
    # ============================================================

    - name: Install Patch Block
      block:

        - name: Check if KB already installed
          win_shell: |
            $kb = "{{ kb_number }}"
            if ($kb -and (Get-HotFix -Id $kb -ErrorAction SilentlyContinue)) {
                Write-Output "ALREADY_INSTALLED"
                exit 0
            } else {
                exit 1
            }
          register: hotfix_check
          changed_when: false
          failed_when: false
          when: kb_number != ""

        - name: Skip install if already present
          set_fact:
            patch_status: "Success (patch already installed)"
          when:
            - kb_number != ""
            - hotfix_check.stdout is defined
            - "'ALREADY_INSTALLED' in hotfix_check.stdout"

        - name: Install .msu patch
          win_command: >
            wusa.exe "{{ dest_path }}" /quiet /norestart
          become: yes
          become_method: runas
          become_user: ansible_svc
          register: install_result
          when:
            - copy_res.changed
            - patch_status != "Success (patch already installed)"
          failed_when: >
            install_result.rc is defined and
            install_result.rc != 0 and
            install_result.rc not in [0, 3010, 17021]

        - name: Record successful installation
          set_fact:
            patch_status: "Success (1 patch installed)"
          when:
            - install_result.rc is defined
            - install_result.rc in [0, 3010, 17021]

        - name: Reboot if required
          win_reboot:
            reboot_timeout: 600
          register: reboot_result
          when: install_result.rc | default(0) == 3010

        - name: Update reboot status
          set_fact:
            reboot_status: "Reboot Completed"
          when: reboot_result is defined and reboot_result.rebooted | default(false)

      rescue:

        - name: Set failure message
          set_fact:
            patch_status: "Failed (RC {{ install_result.rc | default('N/A') }})"
            reboot_status: "Error - installation failed"


    # ============================================================
    # CAPTURE NEW PATCH DETAILS
    # ============================================================

    - name: Get details of newly installed patch
      win_shell: |
        $kb = "{{ kb_number }}"
        if ($kb) {
            $patch = Get-HotFix -Id $kb -ErrorAction SilentlyContinue
            if ($patch) {
                "$($patch.HotFixID)|$($patch.InstalledOn)"
            }
        }
      register: new_patch_info
      changed_when: false
      failed_when: false
      when: kb_number != ""

    - name: Parse new patch details
      set_fact:
        new_kb_installed_on: "{{ new_patch_info.stdout.split('|')[1] | default('N/A') }}"
      when: new_patch_info.stdout is defined and new_patch_info.stdout != ""


    # ============================================================
    # CLEANUP
    # ============================================================

    - name: Cleanup patch file
      win_file:
        path: "{{ dest_path }}"
        state: absent
      when: copy_res.changed
      ignore_errors: yes


    # ============================================================
    # REPORT GENERATION (FIXED CSV FORMAT)
    # ============================================================

    - name: Create CSV Header (Quoted)
      run_once: true
      delegate_to: localhost
      copy:
        dest: "{{ report_file }}"
        content: "\"Hostname\",\"IP_Address\",\"OS_Version\",\"Previous_KB\",\"Previous_KB_Date\",\"New_KB\",\"New_KB_Installed_On\",\"Patch_Status\",\"Reboot_Action\",\"Timestamp\"\n"

    - name: Append host data to CSV (Quoted)
      delegate_to: localhost
      throttle: 1
      lineinfile:
        path: "{{ report_file }}"
        line: "\"{{ inventory_hostname }}\",\"{{ reporting_ip }}\",\"{{ full_os_name }}\",\"{{ previous_kb }}\",\"{{ previous_kb_date }}\",\"{{ kb_number | upper }}\",\"{{ new_kb_installed_on }}\",\"{{ patch_status }}\",\"{{ reboot_status }}\",\"{{ lookup('pipe','date --iso-8601=seconds') }}\""


    # ============================================================
    # EMAIL REPORT
    # ============================================================

    - name: Check if report exists
      run_once: true
      delegate_to: localhost
      stat:
        path: "{{ report_file }}"
      register: final_report_stat

    - name: Email Final Report
      run_once: true
      delegate_to: localhost
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ vault_smtp_password }}"
        secure: starttls
        to: "{{ email_recipient }}"
        subject: "PROD WINDOWS AUDIT: Patching Report Complete"
        body: "Windows patching cycle complete. See attached report."
        attach: "{{ report_file }}"
      when: final_report_stat.stat.exists | default(false)
