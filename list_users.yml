---
- name: List human usernames on Linux servers
  hosts: all
  gather_facts: false
  become: true

  tasks:

    - name: Extract human users (UID >= 1000, excluding nobody)
      shell: "awk -F: '$3 >= 1000 && $3 < 65534 {print $1}' /etc/passwd"
      register: human_users
      changed_when: false

    - name: Display human usernames per host
      debug:
        msg: "Human users on {{ inventory_hostname }}: {{ human_users.stdout_lines }}"
